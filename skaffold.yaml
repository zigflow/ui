apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: ui

build:
  artifacts:
    - image: ui
      docker:
        dockerfile: Dockerfile
        target: dev
      sync:
        manual:
          - src: "src/**/*"
            dest: /home/node/app
          - src: "static/**/*"
            dest: /home/node/app
  local:
    push: false
    useBuildkit: true

deploy:
  helm:
    releases:
      - name: ui
        chartPath: charts/ui
        namespace: zigflow
        createNamespace: true
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_ui}}"
          image.tag: "{{.IMAGE_TAG_ui}}"
        setValues:
          image:
            pullPolicy: Never
          securityContext:
            readOnlyRootFilesystem: false

portForward:
  - resourceType: Service
    resourceName: ui
    namespace: zigflow
    port: 3000
    localPort: 3000

profiles:
  - name: minikube
    activation:
      - kubeContext: minikube
